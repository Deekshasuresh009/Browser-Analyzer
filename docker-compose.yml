version: "3.8"
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    volumes:
      - ./app:/app
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./jobs_db.json:/app/jobs_db.json
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
